<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Vocantis</title>
    <link rel="stylesheet" href="assets/css/pages/home.css"> 
    <link rel="stylesheet" href="assets/css/pages/login.css">
    <link rel="stylesheet" href="assets/css/global/loading.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <link rel="icon" type="image/png" href="img/favicon/favicon-96x96.png" sizes="96x96" />
    <link rel="icon" type="image/svg+xml" href="img/favicon/favicon.svg" />
    <link rel="shortcut icon" href="img/favicon/favicon.ico" />
    <link rel="apple-touch-icon" sizes="180x180" href="img/favicon/apple-touch-icon.png" />
    <link rel="manifest" href="img/favicon/site.webmanifest"/>

</head>
<body>

    <div class="preloader" id="preloader">
  		<div class="loader" id="loader"></div>
	</div>

    <main class="login-container">
        <div class="login-card">
            
            <div class="login-header">
                <h2>Bem-vindo de volta!</h2>
                <p>Acesse sua conta para continuar sua jornada.</p>
            </div>

            <form class="login-form">
                <div class="input-group">
                    <label for="email">E-mail</label>
                    <input type="email" id="email" placeholder="Digite seu e-mail" required>
                </div>
                
                <div class="input-group">
                    <label for="senha">Senha</label>
                    <input type="password" id="senha" placeholder="Digite sua senha" required>
                </div>

                <div class="form-actions">
                    <div class="lembrar-mim">
                        <input type="checkbox" id="lembrar">
                        <label for="lembrar">Lembrar de mim</label>
                    </div>
                    <a href="#" class="esqueci-senha">Esqueci a senha</a>
                </div>

                <button type="submit" id="btnLogin" class="btn-gradiente btn-full">Entrar</button>
            </form>

            <div class="login-footer">
                <p>Ainda não tem uma conta? <a href="cadastro.html">Cadastre-se</a></p>
            </div>
            
        </div>
    </main>

    <script src="assets/js/login.js"></script>
    <script src="assets/js/script_preloader.js"></script>
</body>
</html>
